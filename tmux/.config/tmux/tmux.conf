# Prefix: Ctrl-a instead of Ctrl-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Colors / terminal
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Start windows/panes at 1, renumber on close
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Mouse support
set -g mouse on

# Faster escape (helps Neovim)
set -sg escape-time 10

# Bigger scrollback
set -g history-limit 50000

# Outer terminal/tab title: "session: window". Windows auto-rename to the
# running program (automatic-rename is on by default), so the tab shows both
# the tmux session and what's running in it.
set -g set-titles on
set -g set-titles-string "#S: #W"

# Reload config. Run through the shell so ${XDG_CONFIG_HOME:-...} expands with a
# fallback — tmux's own ${VAR} expansion doesn't support the ":-" default and
# errors on it ("invalid environment variable").
bind r run-shell 'tmux source-file "${XDG_CONFIG_HOME:-$HOME/.config}/tmux/tmux.conf" && tmux display "Config reloaded"'

# Vim-style pane splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Status bar — classic tmux look: a green bar at the bottom, so it's always
# obvious you're inside a tmux session.
set -g status-position bottom
set -g status-style "fg=black bg=green"
set -g status-left "[#S] "
set -g status-left-length 20
set -g status-right " %H:%M %d-%b "
# Make the active window stand out against the green bar.
setw -g window-status-current-style "fg=green bg=black bold"
